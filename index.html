<body class="bg-surface font-body-lg text-on-surface">

        <div class="hidden md:flex gap-8 h-full items-center">

    <!-- Main Content Canvas -->
    <main class="pt-24 pb-12 px-gutter md:px-margin-desktop max-w-[1200px] mx-auto min-h-screen">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg">
            <!-- Left Column (Input) - 7/12 ratio -->

                        </button>
                        <button class="pb-base px-2 font-headline-md text-secondary transition-all" id="tab-btn-upload"
                            onclick="switchTab('upload')">
                            Upload Photo
                        </button>
                    </div>
                    <!-- Camera Tab Content -->
                    <div class="active flex-1 flex flex-col gap-md" data-tab-content="" id="tab-camera">
                        <div class="relative aspect-video bg-black rounded-xl overflow-hidden group">
                            <div

                                <span class="material-symbols-outlined text-[48px]">videocam</span>
                            </div>
                            <!-- Webcam Feed -->

                                </div>
                            </div>
                        </div>
                        <div class="flex justify-center">
                            <button onclick="captureAndPredict()"

                                <span class="material-symbols-outlined">photo_camera</span>
                                Capture
                            </button>
                        </div>
                    </div>
                    <!-- Upload Tab Content -->
                    <div class="flex-1 flex flex-col h-full" data-tab-content="" id="tab-upload">
                        <input type="file" id="file-input" accept="image/*" class="hidden"
                            onchange="handleUpload(event)">
                        <img id="upload-preview" class="hidden w-full rounded-xl object-cover max-h-[300px] mb-md" />
                        <div id="upload-placeholder"
                            class="flex-1 border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center p-xl hover:border-primary transition-colors cursor-pointer group"
                            onclick="document.getElementById('file-input').click()">
                            <span
                                class="material-symbols-outlined text-[64px] text-outline-variant group-hover:text-primary mb-md transition-colors">cloud_upload</span>
                            <h3 class="font-headline-md text-on-surface mb-xs">Drag and drop plant photo</h3>
                            <p class="text-body-sm text-secondary mb-lg">Support for JPEG, PNG up to 10MB</p>
                            <button onclick="event.stopPropagation(); document.getElementById('file-input').click()"

    <!-- React Component Logic Container -->

    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/j33SLZtyT/";

        let model, webcamStream, isWebcamRunning = false;

        // ── Load Model ──────────────────────────────────────────
        async function loadModel() {
            const modelURL = MODEL_URL + "model.json";
            const metadataURL = MODEL_URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            console.log("Model loaded!");
        }

        // ── Tab Switching ────────────────────────────────────────
        function switchTab(tab) {
            const cameraBtn = document.getElementById('tab-btn-camera');
            const uploadBtn = document.getElementById('tab-btn-upload');
            const cameraContent = document.getElementById('tab-camera');
            const uploadContent = document.getElementById('tab-upload');

            if (tab === 'camera') {
                cameraBtn.classList.replace('text-secondary', 'text-primary');
                cameraBtn.classList.add('border-primary');
                uploadBtn.classList.replace('text-primary', 'text-secondary');
                uploadBtn.classList.remove('border-primary');
                cameraContent.classList.add('active');
                uploadContent.classList.remove('active');
            } else {
                stopWebcam();
                uploadBtn.classList.replace('text-secondary', 'text-primary');
                uploadBtn.classList.add('border-primary');
                cameraBtn.classList.replace('text-primary', 'text-secondary');
                cameraBtn.classList.remove('border-primary');
                uploadContent.classList.add('active');
                cameraContent.classList.remove('active');
            }
        }

        // ── Webcam ───────────────────────────────────────────────

        async function startWebcam() {
            const container = document.getElementById('webcam-container');

            // Buat elemen video langsung
            let video = document.getElementById('webcam-video');
            if (!video) {
                video = document.createElement('video');
                video.id = 'webcam-video';
                video.autoplay = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.borderRadius = '0.75rem';
                container.innerHTML = '';
                container.appendChild(video);
            }

            // Request kamera belakang
            webcamStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { exact: "environment" } }
            });
            video.srcObject = webcamStream;
            isWebcamRunning = true;
        }

        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
                webcamStream = null;
                isWebcamRunning = false;
            }
        }

        async function captureAndPredict() {
            if (!isWebcamRunning) {
                await startWebcam();
                return;
            }

            // Ambil frame dari video ke canvas
            const video = document.getElementById('webcam-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            await predict(canvas);
        }

        // ── Upload ───────────────────────────────────────────────
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    document.getElementById('upload-preview').src = e.target.result;
                    document.getElementById('upload-preview').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    await predict(img);
                };
            };
            reader.readAsDataURL(file);
        }

        // ── Predict ──────────────────────────────────────────────
        async function predict(imageElement) {
            if (!model) {
                alert("Model belum selesai loading, tunggu sebentar.");
                return;
            }
            const predictions = await model.predict(imageElement);

            // Sort: highest confidence first
            const sorted = [...predictions].sort((a, b) => b.probability - a.probability);
            const top = sorted[0];

            // Update top result
            document.getElementById('result-label').textContent = top.className;
            document.getElementById('result-confidence').textContent =
                (top.probability * 100).toFixed(1) + "% Match";

            // Update confidence bars
            predictions.forEach(p => {
                const pct = (p.probability * 100).toFixed(1);
                const key = p.className.toLowerCase().replace(/\s+/g, '-');
                const barEl = document.getElementById('bar-' + key);
                const pctEl = document.getElementById('pct-' + key);
                if (barEl) barEl.style.width = pct + '%';
                if (pctEl) pctEl.textContent = pct + '%';

                // Highlight top bar
                if (barEl) {
                    const isTop = p.className === top.className;
                    barEl.classList.toggle('bg-primary-container', isTop);
                    barEl.classList.toggle('bg-secondary-fixed-dim', !isTop);
                }
                // Highlight top percentage text
                if (pctEl) {
                    const isTop = p.className === top.className;
                    pctEl.classList.toggle('text-primary', isTop);
                    pctEl.classList.toggle('font-bold', isTop);
                    pctEl.classList.toggle('text-secondary', !isTop);
                }
            });
        }

        // ── Init ─────────────────────────────────────────────────
        window.addEventListener('load', loadModel);
    </script>
